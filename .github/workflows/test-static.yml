name: 测试-静态数据写入
on:
  workflow_dispatch: true

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 写入静态测试数据
        run: |
          import json
          data = {
            "updateTime": "2026-04-27 12:00:00",
            "gold999": 700,
            "k22": 641,
            "k18": 525,
            "pt999": 300,
            "pd990": 220,
            "silver999": 4
          }
          with open("price.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
        shell: python

      - name: 提交更新
        run: |
          git config user.name "price-bot"
          git config user.email "bot@github.com"
          git add price.json
          git commit -m "测试数据" || echo "无需提交"
          git push
