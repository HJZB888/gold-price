<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时金价大盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .title-box {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #eee;
        }
        .title-box h1 {
            font-size: 24px;
            color: #222;
        }
        .update-time {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        .price-card-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .price-card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #eaeaea;
        }
        .card-name {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .price-num {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0;
        }
        .range-info {
            font-size: 14px;
            color: #777;
            display: flex;
            justify-content: space-between;
        }
        .tips {
            margin-top: 30px;
            padding: 15px;
            background: #eeeeee;
            font-size: 13px;
            color: #666;
            border-radius: 6px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-box">
            <h1>贵金属实时大盘报价</h1>
            <div class="update-time" id="updateTime">数据加载中...</div>
        </div>

        <div class="price-card-wrap">
            <!-- 黄金 -->
            <div class="price-card" id="goldCard">
                <div class="card-name">黄金 AU9999</div>
                <div class="price-num" id="goldPrice">--</div>
                <div class="range-info">
                    <span>开盘：<span id="goldOpen">--</span></span>
                    <span>最高：<span id="goldHigh">--</span></span>
                    <span>最低：<span id="goldLow">--</span></span>
                </div>
            </div>

            <!-- 铂金 -->
            <div class="price-card" id="ptCard">
                <div class="card-name">铂金 PT999</div>
                <div class="price-num" id="ptPrice">--</div>
                <div class="range-info">
                    <span>开盘：<span id="ptOpen">--</span></span>
                    <span>最高：<span id="ptHigh">--</span></span>
                    <span>最低：<span id="ptLow">--</span></span>
                </div>
            </div>

            <!-- 18K金 -->
            <div class="price-card" id="k18Card">
                <div class="card-name">18K金</div>
                <div class="price-num" id="k18Price">--</div>
                <div class="range-info">
                    <span>实时参考价</span>
                </div>
            </div>

            <!-- 白银 -->
            <div class="price-card" id="agCard">
                <div class="card-name">白银 AG999</div>
                <div class="price-num" id="agPrice">--</div>
                <div class="range-info">
                    <span>实时参考价</span>
                </div>
            </div>
        </div>

        <div class="tips">
            免责声明：本页面数据仅供行情参考，不构成任何交易建议；回收报价以门店当日实时标价为准，行情实时波动，请以到店咨询为准。
        </div>
    </div>

<script>
// 跨域公共代理，彻底解决跨域报错
const proxyUrl = "https://cors-anywhere.herokuapp.com/";
const sourceUrl = "https://www.rtgold.com/api/market";

// 刷新数据
async function getPriceData(){
    try{
        const res = await fetch(proxyUrl + sourceUrl);
        const data = await res.json();
        const list = data.data || [];

        // 赋值渲染
        list.forEach(item => {
            let nowPrice = parseFloat(item.price);
            let openPrice = parseFloat(item.open);
            let highPrice = parseFloat(item.high);
            let lowPrice = parseFloat(item.low);

            if(item.name.includes("AU9999")){
                document.getElementById("goldPrice").innerText = nowPrice;
                document.getElementById("goldOpen").innerText = openPrice;
                document.getElementById("goldHigh").innerText = highPrice;
                document.getElementById("goldLow").innerText = lowPrice;
                // 红绿涨跌
                document.getElementById("goldPrice").style.color = nowPrice >= openPrice ? "#e53935" : "#43a047";
            }
            if(item.name.includes("PT999")){
                document.getElementById("ptPrice").innerText = nowPrice;
                document.getElementById("ptOpen").innerText = openPrice;
                document.getElementById("ptHigh").innerText = highPrice;
                document.getElementById("ptLow").innerText = lowPrice;
                document.getElementById("ptPrice").style.color = nowPrice >= openPrice ? "#e53935" : "#43a047";
            }
            if(item.name.includes("18K")){
                document.getElementById("k18Price").innerText = nowPrice;
                document.getElementById("k18Price").style.color = "#333";
            }
            if(item.name.includes("白银")){
                document.getElementById("agPrice").innerText = nowPrice;
                document.getElementById("agPrice").style.color = "#333";
            }
        })

        // 更新时间
        const now = new Date();
        document.getElementById("updateTime").innerText = "最后更新：" + now.toLocaleString();

    }catch(e){
        console.log("数据获取异常：",e);
        document.getElementById("updateTime").innerText = "行情短暂加载异常，自动重试中...";
    }
}

// 首次加载执行
getPriceData();
// 每15秒自动刷新，实时行情
setInterval(getPriceData, 15000);
</script>

</body>
</html>
